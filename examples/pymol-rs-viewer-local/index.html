<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PyMOL-RS viewer — local file</title>
    <style>
      :root {
        color-scheme: dark light;
      }
      body {
        margin: 0;
        font-family: system-ui, sans-serif;
      }
      #app {
        display: flex;
        flex-direction: column;
        height: 100vh;
      }
      #toolbar {
        padding: 0.75rem 1rem;
        border-bottom: 1px solid #ccc;
        display: flex;
        gap: 1rem;
        align-items: center;
        flex-wrap: wrap;
      }
      #viewer {
        flex: 1;
        min-height: 280px;
      }
      .hint {
        opacity: 0.8;
        font-size: 0.875rem;
        max-width: 42rem;
        line-height: 1.4;
        margin: 0;
      }
    </style>
  </head>
  <body>
    <div id="app">
      <div id="toolbar">
        <label>
          <strong>Open structure</strong>
          <input
            type="file"
            id="file"
            accept=".pdb,.cif,.mmcif,.bcif,.ent,.gz,application/octet-stream"
          />
        </label>
        <p class="hint">
          Choose a PDB, mmCIF, or BCIF file from your computer. The viewer runs
          in your browser with WebGPU (recent Chrome, Edge, or Firefox Nightly
          with WebGPU enabled).
        </p>
      </div>
      <div id="viewer" aria-label="Molecule viewer"></div>
    </div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
